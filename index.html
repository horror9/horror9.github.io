<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Lock Screen — iPhone風デモ（パスコード付き）</title>
<style>
  :root{
    --bg1:#0f1724; --bg2:#0b1220; --accent:rgba(255,255,255,0.95);
    --glass:rgba(255,255,255,0.06); --glass-2:rgba(255,255,255,0.08);
    --screen-w:390px; --screen-h:844px;
  }
  html,body{height:100%;margin:0;font-family:-apple-system, "Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:linear-gradient(180deg,var(--bg1),var(--bg2));display:flex;align-items:center;justify-content:center;color:var(--accent);-webkit-font-smoothing:antialiased;}
  .device{width:calc(var(--screen-w) * 0.9);max-width:420px;aspect-ratio:390/844;border-radius:34px;overflow:hidden;background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(0,0,0,0.06));box-shadow:0 20px 80px rgba(0,0,0,0.6);position:relative;touch-action:none}
  .wallpaper{position:absolute;inset:0;background:radial-gradient(1200px 600px at 10% 10%, rgba(255,80,120,0.08), transparent 10%), radial-gradient(900px 500px at 90% 80%, rgba(80,160,255,0.06), transparent 10%), linear-gradient(180deg,#071029 0%, #0b1220 100%);filter:blur(0.6px) saturate(1.05);transform:scale(1.02);z-index:0}
  .screen{position:relative;z-index:1;height:100%;padding:28px 18px 18px 18px;display:flex;flex-direction:column;justify-content:space-between}
  .status{display:flex;justify-content:space-between;align-items:center;color:rgba(255,255,255,0.85);font-size:13px}
  .time{margin-top:20px;text-align:center}
  .time .hhmm{font-size:72px;line-height:0.9;font-weight:600;letter-spacing:-2px;text-shadow:0 6px 18px rgba(0,0,0,0.6)}
  .time .date{margin-top:6px;font-size:18px;opacity:0.9}
  .notifs{margin-top:28px;display:flex;flex-direction:column;gap:12px;padding:0 22px}
  .notif{background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02));border-radius:12px;padding:12px;box-shadow:0 6px 18px rgba(2,6,23,0.4), inset 0 1px rgba(255,255,255,0.02);display:flex;gap:12px;align-items:flex-start;backdrop-filter:blur(6px) saturate(1.1)}
  .notif .app{width:40px;height:40px;border-radius:10px;background:var(--glass-2);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--accent);flex-shrink:0}
  .notif .content{font-size:14px;line-height:1.3;color:rgba(255,255,255,0.95)}
  .small{font-size:12px;opacity:0.85;margin-top:6px;color:rgba(255,255,255,0.75)}
  .bottom{display:flex;align-items:center;justify-content:space-between;padding:14px 18px}
  .action-btn{width:56px;height:56px;border-radius:28px;display:flex;align-items:center;justify-content:center;background:var(--glass);box-shadow:0 6px 20px rgba(0,0,0,0.45);font-size:18px;user-select:none}
  .grab{margin:0 auto;width:160px;text-align:center;position:relative;pointer-events:none}
  .swipe-bar{height:6px;width:78px;margin:0 auto 8px;border-radius:6px;background:linear-gradient(90deg, rgba(255,255,255,0.12), rgba(255,255,255,0.06));box-shadow:0 3px 8px rgba(0,0,0,0.6) inset}
  .swipe-hint{font-size:13px;opacity:0.9;pointer-events:none}
  .home{position:absolute;inset:0;z-index:3;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg, rgba(0,0,0,0.45), rgba(0,0,0,0.6));color:white;font-size:20px;transform:translateY(20px);opacity:0;transition:all 420ms cubic-bezier(.2,.9,.3,1)}
  .home.show{opacity:1;transform:translateY(0)}
  /* パスコードモーダル */
  .pass-modal{position:absolute;inset:0;z-index:5;display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px);background:linear-gradient(180deg, rgba(0,0,0,0.45), rgba(0,0,0,0.6))}
  .pass-panel{width:86%;max-width:360px;background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02));border-radius:18px;padding:18px;text-align:center;color:var(--accent);box-shadow:0 12px 40px rgba(0,0,0,0.6)}
  .pass-title{font-size:18px;margin-bottom:8px}
  .dots{display:flex;gap:12px;justify-content:center;margin:14px 0 6px}
  .dot{width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,0.12);box-shadow:inset 0 1px rgba(255,255,255,0.02)}
  .dot.filled{background:var(--accent)}
  .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}
  .key{padding:14px 0;border-radius:10px;background:var(--glass);font-size:18px;user-select:none}
  .key:active{transform:scale(0.98)}
  .pass-row{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
  .cancel{background:transparent;border:none;color:rgba(255,255,255,0.85);font-size:14px}
  .shake{animation:shake 540ms}
  @keyframes shake{10%{transform:translateX(-10px)}30%{transform:translateX(10px)}50%{transform:translateX(-6px)}70%{transform:translateX(4px)}90%{transform:translateX(-2px)}100%{transform:translateX(0)}}
  @media (max-width:420px){.time .hhmm{font-size:56px}}
</style>
</head>
<body>
  <div class="device" id="device">
    <div class="wallpaper" id="wallpaper"></div>

    <div class="screen" id="screen">
      <div>
        <div class="status">
          <div class="left"><div id="carrier">docomo</div></div>
          <div class="right"><div id="wifi">Wi-Fi</div><div id="battery">🔋 <span id="batText">--%</span></div></div>
        </div>

        <div class="time" aria-live="polite">
          <div class="hhmm" id="time">--:--</div>
          <div class="date" id="date">--</div>
        </div>

        <div class="notifs" id="notifs">
          <div class="notif"><div class="app">M</div><div class="content">メッセージ — きょうの待ち合わせは何時にする？ <div class="small">2分前</div></div></div>
          <div class="notif"><div class="app">T</div><div class="content">Twitter風通知 — だれかがリプライしました。 <div class="small">8分前</div></div></div>
        </div>
      </div>

      <div class="bottom">
        <div class="action-btn" id="flash">ライト</div>
        <div class="grab" id="grabArea"><div class="swipe-bar"></div><div class="swipe-hint">上にスワイプして解除</div></div>
        <div class="action-btn" id="cam">カメラ</div>
      </div>
    </div>

    <div class="home" id="home">
      <div>
        <div style="font-size:20px;margin-bottom:12px">アンロックされました — ホーム画面風ダミー</div>
        <button id="relock" style="padding:8px 12px;border-radius:10px;background:rgba(255,255,255,0.08);border:none;color:var(--accent);cursor:pointer">再ロック</button>
      </div>
    </div>

    <!-- パスコードモーダル -->
    <div class="pass-modal" id="passModal" aria-hidden="true">
      <div class="pass-panel" role="dialog" aria-label="パスコード入力">
        <div class="pass-title">パスコードを入力</div>
        <div class="dots" id="dots">
          <div class="dot" data-i="0"></div>
          <div class="dot" data-i="1"></div>
          <div class="dot" data-i="2"></div>
          <div class="dot" data-i="3"></div>
        </div>
        <div class="keypad" id="keypad">
          <!-- 1..9 -->
          <div class="key">1</div><div class="key">2</div><div class="key">3</div>
          <div class="key">4</div><div class="key">5</div><div class="key">6</div>
          <div class="key">7</div><div class="key">8</div><div class="key">9</div>
          <div class="key" id="empty"></div>
          <div class="key">0</div>
          <div class="key" id="del">⌫</div>
        </div>
        <div class="pass-row">
          <button class="cancel" id="cancelPass">キャンセル</button>
          <div style="font-size:12px;color:rgba(255,255,255,0.65)">4桁の数字</div>
        </div>
      </div>
    </div>

  </div>

<script>
/* --- 設定: パスコード --- */
const PASSCODE = '1234'; // デフォルト。ここを書き換えれば変更可能

/* --- 時刻・日付 --- */
function pad(n){ return n<10 ? '0'+n : n; }
function updateTime(){
  const now = new Date();
  document.getElementById('time').textContent = pad(now.getHours()) + ':' + pad(now.getMinutes());
  const opts = { weekday:'short', month:'short', day:'numeric' };
  document.getElementById('date').textContent = now.toLocaleDateString('ja-JP', opts);
}
updateTime();
setInterval(updateTime, 1000);

/* --- バッテリー --- */
if ('getBattery' in navigator){
  navigator.getBattery().then(bat=>{
    function refresh(){ document.getElementById('batText').textContent = Math.round(bat.level*100) + '%'; }
    refresh(); bat.addEventListener('levelchange', refresh);
  }).catch(()=> document.getElementById('batText').textContent='--%');
} else { document.getElementById('batText').textContent = '83%'; }

/* --- スワイプでパスコード表示 --- */
const device = document.getElementById('device');
const grab = document.getElementById('grabArea');
const passModal = document.getElementById('passModal');
const home = document.getElementById('home');
let startY = null, currentY = 0, showingPass = false;
const threshold = device.clientHeight * 0.16;

function startDrag(y){
  startY = y;
}
function moveDrag(y){
  if (startY === null) return;
  currentY = startY - y;
  if (currentY < 0) currentY = 0;
  const pct = Math.min(currentY / threshold, 1);
  device.style.transform = `translateY(${ -pct * 12 }px) scale(${1 - pct*0.01})`;
}
function endDrag(){
  if (startY === null) return;
  if (currentY >= threshold && !showingPass){
    // スワイプ成功 -> パスコードモーダル表示
    showPassModal();
  } else {
    device.style.transition = 'transform 280ms ease';
    device.style.transform = '';
    setTimeout(()=> device.style.transition = '', 300);
  }
  startY = null; currentY = 0;
}
grab.addEventListener('mousedown', e => startDrag(e.clientY));
window.addEventListener('mousemove', e => moveDrag(e.clientY));
window.addEventListener('mouseup', endDrag);
grab.addEventListener('touchstart', e => startDrag(e.touches[0].clientY), {passive:true});
window.addEventListener('touchmove', e => moveDrag(e.touches[0].clientY), {passive:true});
window.addEventListener('touchend', endDrag);

/* --- パスコードロジック --- */
let input = '';
const dots = [...document.querySelectorAll('.dot')];
function updateDots(){
  dots.forEach((d,i)=> d.classList.toggle('filled', i < input.length));
}
function showPassModal(){
  showingPass = true;
  passModal.style.display = 'flex';
  passModal.setAttribute('aria-hidden', 'false');
  // 軽い視覚効果
  device.style.transform = 'scale(0.995) translateY(-6px)';
}
function hidePassModal(){
  showingPass = false;
  passModal.style.display = 'none';
  passModal.setAttribute('aria-hidden', 'true');
  device.style.transform = '';
  input = ''; updateDots();
}

/* キーパッド入力 */
document.getElementById('keypad').addEventListener('click', (e)=>{
  const key = e.target.closest('.key');
  if (!key || key.id === 'empty') return;
  if (key.id === 'del'){
    input = input.slice(0, -1);
    updateDots();
    return;
  }
  const v = key.textContent.trim();
  if (!/^\d$/.test(v)) return;
  if (input.length >= 4) return;
  input += v;
  updateDots();
  if (input.length === 4) verifyPasscode();
});

/* 検証 */
function verifyPasscode(){
  if (input === PASSCODE){
    // 成功 -> アンロック
    passSuccess();
  } else {
    passFail();
  }
}
function passSuccess(){
  // アンロック演出
  hidePassModal();
  document.getElementById('screen').style.opacity = '0';
  home.classList.add('show');
}
function passFail(){
  // 失敗: シェイクしてリセット
  const panel = document.querySelector('.pass-panel');
  panel.classList.remove('shake');
  void panel.offsetWidth; // 再トリガーのため
  panel.classList.add('shake');
  navigator.vibrate && navigator.vibrate(180); // 振動（対応する端末で）
  input = ''; updateDots();
}

/* キャンセル */
document.getElementById('cancelPass').addEventListener('click', ()=>{
  hidePassModal();
});

/* カメラ・ライト */
document.getElementById('cam').addEventListener('click', ()=> alert('カメラ起動（ダミー）'));
document.getElementById('flash').addEventListener('click', ()=> alert('ライト点灯（ダミー）'));

/* 通知タップ */
document.getElementById('notifs').addEventListener('click', (e)=>{
  const n = e.target.closest('.notif');
  if (!n) return;
  n.style.transform = 'translateY(-6px)'; n.style.transition = 'transform 200ms';
  setTimeout(()=> n.style.transform = '', 250);
});

/* 再ロックボタン */
document.getElementById('relock').addEventListener('click', ()=>{
  // 簡易的にリセットしてロック状態に戻す
  document.getElementById('screen').style.opacity = '1';
  home.classList.remove('show');
  // 強制的にモーダルを隠す
  hidePassModal();
});

/* キーボードで直接入力（デバッグ用）*/
window.addEventListener('keydown', (e)=>{
  if (!showingPass) return;
  if (e.key === 'Backspace'){ input = input.slice(0,-1); updateDots(); }
  if (/^\d$/.test(e.key) && input.length < 4){ input += e.key; updateDots(); if (input.length===4) verifyPasscode(); }
  if (e.key === 'Escape') hidePassModal();
});

/* 初期ドキュメント読み込み完了時にフォーカス関連を安全に初期化 */
document.addEventListener('DOMContentLoaded', ()=>{ input=''; updateDots(); });
</script>
</body>
</html>
